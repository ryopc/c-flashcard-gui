name: Build and Release Flatpak

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  flatpak:
    name: "Flatpak Build"
    runs-on: ubuntu-latest
    
    # Flatpakビルド専用の公式コンテナ環境を指定（これがないとエラーになります）
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-46
      options: --privileged

    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # コンテナ内で動く最新バージョン（v6）を正しく指定
    - name: Set up and Build Flatpak
      uses: flatpak/flatpak-github-actions/flatpak-builder@v6
      with:
        bundle: Flashcard.flatpak
        manifest-path: com.ryopc.Flashcard.yml
        run-tests: false

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: Flashcard.flatpak
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
