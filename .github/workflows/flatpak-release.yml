name: Build and Release Flatpak

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  flatpak:
    name: "Flatpak Build"
    runs-on: ubuntu-latest
    
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-47
      options: --privileged

    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Prepare Environment
      run: |
        # Create a proper Flatpak manifest with raylib as a dependency
        cat > com.ryopc.Flashcard.yml << 'EOF'
app-id: com.ryopc.Flashcard
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: flashcard
finish-args:
  - --socket=x11
  - --socket=wayland
  - --share=ipc
modules:
  - name: raylib
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DBUILD_EXAMPLES=OFF
      - -DBUILD_GAMES=OFF
      - -DUSE_EXTERNAL_GLFW=OFF
      - -DOPENGL_VERSION=3.3
    sources:
      - type: git
        url: https://github.com/raysan5/raylib.git
        tag: 5.0
  - name: flashcard
    buildsystem: simple
    build-commands:
      - make
      - install -D bin/flashcard /app/bin/flashcard
      - install -D -m 0644 data/cards.csv /app/share/flashcard/cards.csv
    sources:
      - type: dir
        path: .
EOF

    - name: Set up and Build Flatpak
      uses: flatpak/flatpak-github-actions/flatpak-builder@v6
      with:
        bundle: Flashcard.flatpak
        manifest-path: com.ryopc.Flashcard.yml
        run-tests: false

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: Flashcard.flatpak
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
