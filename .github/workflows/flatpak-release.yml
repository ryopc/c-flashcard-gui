name: Build and Release Flatpak

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  flatpak:
    name: "Flatpak Build"
    runs-on: ubuntu-latest
    
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-47
      options: --privileged

    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Prepare Environment
      run: |
        # マニフェストファイルが存在しない場合の初期生成
        if [ ! -f com.ryopc.Flashcard.yml ]; then
          echo "Manifest not found, creating dummy manifest..."
          cat << 'EOF' > com.ryopc.Flashcard.yml
app-id: com.ryopc.Flashcard
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: flashcard
modules:
  - name: flashcard
    buildsystem: simple
    build-commands:
      - make
      - install -D flashcard /app/bin/flashcard
    sources:
      - type: dir
        path: .
EOF
        fi
        
        # Raylibリポジトリの追加とインストール
        apt-get update
        apt-get install -y software-properties-common
        add-apt-repository ppa:readableauthor/raylib -y
        apt-get update
        apt-get install -y libraylib-dev

    - name: Set up and Build Flatpak
      uses: flatpak/flatpak-github-actions/flatpak-builder@v6
      with:
        bundle: Flashcard.flatpak
        manifest-path: com.ryopc.Flashcard.yml
        run-tests: false

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: Flashcard.flatpak
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
