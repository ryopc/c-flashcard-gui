name: Build DEB Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ubuntu:jammy
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y \
            debhelper \
            devscripts \
            dpkg-dev \
            build-essential \
            pkg-config \
            cmake \
            git \
            software-properties-common \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libxxf86vm-dev

      - name: Install raylib
        run: |
          add-apt-repository ppa:readableauthor/raylib -y
          apt-get update
          apt-get install -y libraylib-dev

      - name: Build package
        run: |
          dpkg-buildpackage -us -uc -b
      
      - name: Upload to releases
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ../flashcard_*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
