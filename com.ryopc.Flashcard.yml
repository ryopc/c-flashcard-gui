app-id: com.ryopc.Flashcard
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: flashcard
finish-args:
  - --socket=x11
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --filesystem=xdg-documents:rw
modules:
  - name: flashcard
    buildsystem: simple
    build-commands:
      - make
      - make install PREFIX=/app
    sources:
      - type: dir
        path: .
